<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý danh sách sinh viên</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e2e4ea;
    --border-dark: #c8cad4;
    --text: #1a1d27;
    --text-muted: #6b7080;
    --accent: #3b5bdb;
    --accent-light: #eef1fd;
    --success: #2f9e44;
    --success-bg: #ebfbee;
    --warning: #e67700;
    --warning-bg: #fff3cd;
    --danger: #c92a2a;
    --danger-bg: #fff5f5;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px 16px;
  }

  .page { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 14px; margin-bottom: 24px;
  }
  .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .page-header p { font-size: 14px; color: var(--text-muted); margin-top: 2px; }

  /* Stat cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card.blue .value { color: var(--accent); }
  .stat-card.green .value { color: var(--success); }
  .stat-card.orange .value { color: var(--warning); }
  .stat-card.red .value { color: var(--danger); }

  /* Toolbar */
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    margin-bottom: 16px; align-items: center;
  }
  .toolbar input[type="text"] {
    flex: 1; min-width: 200px; height: 38px; padding: 0 12px;
    border: 1px solid var(--border-dark); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; transition: border-color .15s;
  }
  .toolbar input[type="text"]:focus { border-color: var(--accent); background: #fff; }
  .toolbar select {
    height: 38px; padding: 0 10px; border: 1px solid var(--border-dark);
    border-radius: var(--radius-sm); font-size: 14px; color: var(--text);
    background: var(--bg); cursor: pointer; outline: none;
  }
  .toolbar select:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    height: 38px; padding: 0 16px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: opacity .15s, background .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-dark); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: #ffc9c9; }
  .btn-danger:hover { background: #ffe3e3; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    background: var(--bg); color: var(--text-muted); font-size: 12px;
    font-weight: 600; text-align: left; padding: 11px 14px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fe; }
  td { padding: 11px 14px; vertical-align: middle; }
  td.num { font-weight: 700; font-size: 13px; color: var(--text-muted); }
  td.name { font-weight: 600; }
  td.code { font-family: 'Courier New', monospace; font-size: 13px; color: var(--accent); }
  td.score { font-weight: 700; }
  .score-a { color: #2f9e44; }
  .score-b { color: #1971c2; }
  .score-c { color: #e67700; }
  .score-d { color: #c92a2a; }

  /* Badges */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-nam { background: #dbe4ff; color: #3b5bdb; }
  .badge-nu  { background: #fce4ec; color: #c2185b; }
  .badge-active { background: var(--success-bg); color: var(--success); }
  .badge-leave  { background: var(--warning-bg); color: var(--warning); }
  .badge-drop   { background: var(--danger-bg); color: var(--danger); }

  /* Action buttons */
  .acts { display: flex; gap: 4px; }
  .act { background: none; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 5px 8px; cursor: pointer; font-size: 15px; line-height: 1; transition: background .12s; }
  .act:hover { background: var(--bg); border-color: var(--border-dark); }
  .act.del:hover { background: var(--danger-bg); border-color: #ffc9c9; }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 200; align-items: center; justify-content: center; padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius); padding: 28px;
    width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
  }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
  .form-row input, .form-row select {
    width: 100%; height: 40px; padding: 0 12px; border: 1px solid var(--border-dark);
    border-radius: var(--radius-sm); font-size: 14px; color: var(--text);
    background: var(--bg); outline: none; transition: border-color .15s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); background: #fff; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1d27; color: #fff; padding: 10px 22px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s; z-index: 999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty */
  .empty { text-align: center; padding: 40px 0; color: var(--text-muted); }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }

  /* Delete confirm modal */
  .confirm-text { font-size: 15px; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: var(--text-muted); }

  @media (max-width: 600px) {
    .hide-sm { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1>📋 Danh sách sinh viên</h1>
      <p id="class-label">Lớp: ICT1.05 &nbsp;·&nbsp; Năm học: 2025–2026</p>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">+ Thêm sinh viên</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card blue"><div class="label">Tổng sinh viên</div><div class="value" id="s-total">0</div></div>
    <div class="stat-card green"><div class="label">Đang học</div><div class="value" id="s-active">0</div></div>
    <div class="stat-card orange"><div class="label">Nghỉ phép</div><div class="value" id="s-leave">0</div></div>
    <div class="stat-card blue"><div class="label">Nam / Nữ</div><div class="value" id="s-gender">0 / 0</div></div>
    <div class="stat-card green"><div class="label">Điểm TB lớp</div><div class="value" id="s-avg">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="q-search" placeholder="🔍 Tìm tên, mã số, email..." oninput="render()">
    <select onchange="fGender=this.value;render()">
      <option value="">Giới tính</option>
      <option value="Nam">Nam</option>
      <option value="Nữ">Nữ</option>
    </select>
    <select onchange="fStatus=this.value;render()">
      <option value="">Trạng thái</option>
      <option value="Đang học">Đang học</option>
      <option value="Nghỉ phép">Nghỉ phép</option>
      <option value="Thôi học">Thôi học</option>
    </select>
    <select onchange="fRank=this.value;render()">
      <option value="">Học lực</option>
      <option value="Xuất sắc">Xuất sắc</option>
      <option value="Giỏi">Giỏi</option>
      <option value="Khá">Khá</option>
      <option value="Trung bình">Trung bình</option>
      <option value="Yếu">Yếu</option>
    </select>
    <button class="btn btn-secondary" onclick="clearFilters()">✕ Xoá lọc</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th style="width:100px">Mã SV</th>
          <th>Họ và tên</th>
          <th class="hide-sm" style="width:110px">Ngày sinh</th>
          <th style="width:60px">Giới tính</th>
          <th class="hide-sm">Email</th>
          <th style="width:70px">Điểm TB</th>
          <th style="width:70px">GPA</th>
          <th style="width:90px">Học lực</th>
          <th style="width:90px">Trạng thái</th>
          <th style="width:80px">Thao tác</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <p id="count-info" style="font-size:13px;color:#6b7080;margin-top:10px;text-align:right"></p>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-form">
  <div class="modal">
    <h2 id="form-title">Thêm sinh viên</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>Mã sinh viên</label>
        <input id="f-code" placeholder="SV2024001" maxlength="12">
      </div>
      <div class="form-row">
        <label>Ngày sinh</label>
        <input id="f-dob" type="date">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Họ</label>
        <input id="f-lname" placeholder="Nguyễn">
      </div>
      <div class="form-row">
        <label>Tên đệm & tên</label>
        <input id="f-fname" placeholder="Văn An">
      </div>
    </div>
    <div class="form-row">
      <label>Email</label>
      <input id="f-email" type="email" placeholder="sv@example.edu.vn">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Giới tính</label>
        <select id="f-gender"><option>Nam</option><option>Nữ</option></select>
      </div>
      <div class="form-row">
        <label>Điểm trung bình (0–10)</label>
        <input id="f-score" type="number" min="0" max="10" step="0.01" placeholder="0.00">
      </div>
      <div class="form-row">
        <label>GPA (0–4)</label>
        <input id="f-gpa" type="number" min="0" max="4" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-row">
      <label>Trạng thái</label>
      <select id="f-status">
        <option>Đang học</option>
        <option>Nghỉ phép</option>
        <option>Thôi học</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-form')">Huỷ</button>
      <button class="btn btn-primary" onclick="save()">Lưu</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="overlay" id="modal-del">
  <div class="modal" style="max-width:360px">
    <h2>Xác nhận xoá</h2>
    <p class="confirm-text">Xoá sinh viên <strong id="del-name"></strong>?</p>
    <p class="confirm-sub">Thao tác này không thể hoàn tác.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-del')">Huỷ</button>
      <button class="btn btn-danger" onclick="confirmDel()">Xoá</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "sv_students_data";
let students = [
  {id:1, code:"SV2024001", lname:"Nguyễn", fname:"Thị Lan",    dob:"2005-03-12", gender:"Nữ",  email:"lan.nt@edu.vn",   score:8.7,  gpa:3.7, status:"Đang học"},
  {id:2, code:"SV2024002", lname:"Trần",   fname:"Văn Minh",   dob:"2005-07-25", gender:"Nam", email:"minh.tv@edu.vn",  score:7.2,  gpa:2.9, status:"Đang học"},
  {id:3, code:"SV2024003", lname:"Lê",     fname:"Thị Hương",  dob:"2005-01-08", gender:"Nữ",  email:"huong.lt@edu.vn", score:9.1,  gpa:3.9, status:"Đang học"},
  {id:4, code:"SV2024004", lname:"Phạm",   fname:"Quốc Bảo",   dob:"2004-11-30", gender:"Nam", email:"bao.pq@edu.vn",   score:6.5,  gpa:2.5, status:"Đang học"},
  {id:5, code:"SV2024005", lname:"Hoàng",  fname:"Thị Mai",    dob:"2005-05-15", gender:"Nữ",  email:"mai.ht@edu.vn",   score:5.0,  gpa:2.0, status:"Nghỉ phép"},
  {id:6, code:"SV2024006", lname:"Vũ",     fname:"Tuấn Anh",   dob:"2005-09-20", gender:"Nam", email:"anh.vt@edu.vn",   score:8.0,  gpa:3.5, status:"Đang học"},
  {id:7, code:"SV2024007", lname:"Đặng",   fname:"Minh Khoa",  dob:"2005-02-14", gender:"Nam", email:"khoa.dm@edu.vn",  score:3.8,  gpa:1.5, status:"Thôi học"},
  {id:8, code:"SV2024008", lname:"Bùi",    fname:"Thị Ngọc",   dob:"2005-06-01", gender:"Nữ",  email:"ngoc.bt@edu.vn",  score:9.5,  gpa:4.0, status:"Đang học"},
];
let nextId = 9, editId = null, delId = null;
let fGender = "", fStatus = "", fRank = "";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.students) && data.students.length) {
      students = data.students;
      nextId = typeof data.nextId === 'number' ? data.nextId : Math.max(9, ...students.map(s => s.id + 1));
    }
  } catch (error) {
    console.warn('Không thể tải dữ liệu từ localStorage:', error);
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ students, nextId }));
}

// ─── Rank helpers ─────────────────────────────────────────────────────────────
function rank(gpa) {
  if (gpa >= 3.6)  return "Xuất sắc";
  if (gpa >= 3.2)  return "Giỏi";
  if (gpa >= 2.5)  return "Khá";
  if (gpa >= 2.0)  return "Trung bình";
  return "Yếu";
}
function rankClass(gpa) {
  if (gpa >= 3.6)  return "score-a";
  if (gpa >= 3.2)  return "score-a";
  if (gpa >= 2.5)  return "score-b";
  if (gpa >= 2.0)  return "score-c";
  return "score-d";
}
function statusBadge(st) {
  if (st === "Đang học") return "badge-active";
  if (st === "Nghỉ phép") return "badge-leave";
  return "badge-drop";
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const q = (document.getElementById("q-search").value || "").toLowerCase();
  const list = students
    .filter(s => {
      const full = (s.lname + " " + s.fname).toLowerCase();
      const mq = !q || full.includes(q) || s.code.toLowerCase().includes(q) || s.email.toLowerCase().includes(q);
      const mg = !fGender || s.gender === fGender;
      const ms = !fStatus || s.status === fStatus;
      const mr = !fRank   || rank(s.gpa) === fRank;
      return mq && mg && ms && mr;
    })
    .sort((a, b) => {
      const lastA = a.fname.trim().split(/\s+/).slice(-1)[0].toLowerCase();
      const lastB = b.fname.trim().split(/\s+/).slice(-1)[0].toLowerCase();
      return lastA.localeCompare(lastB, 'vi');
    });

  // Stats (always over full list)
  const total = students.length;
  const active = students.filter(s => s.status === "Đang học").length;
  const leave  = students.filter(s => s.status === "Nghỉ phép").length;
  const nam    = students.filter(s => s.gender === "Nam").length;
  const nu     = students.filter(s => s.gender === "Nữ").length;
  const avg    = total ? (students.reduce((a,b) => a+b.score, 0)/total).toFixed(2) : "—";
  document.getElementById("s-total").textContent  = total;
  document.getElementById("s-active").textContent = active;
  document.getElementById("s-leave").textContent  = leave;
  document.getElementById("s-gender").textContent = nam + " / " + nu;
  document.getElementById("s-avg").textContent    = avg;

  document.getElementById("count-info").textContent =
    list.length !== total ? `Hiển thị ${list.length} / ${total} sinh viên` : `${total} sinh viên`;

  const tb = document.getElementById("tbody");
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="10">
      <div class="empty"><div class="icon">🔍</div>Không tìm thấy sinh viên nào phù hợp</div>
    </td></tr>`;
    return;
  }

  tb.innerHTML = list.map((s, i) => {
    const full = s.lname + " " + s.fname;
    const dob  = s.dob ? s.dob.split("-").reverse().join("/") : "—";
    const sc   = Number(s.score).toFixed(2);
    const rk   = rank(s.gpa);
    return `<tr>
      <td class="num">${i+1}</td>
      <td class="code">${s.code}</td>
      <td class="name">${full}</td>
      <td class="hide-sm" style="color:#6b7080;font-size:13px">${dob}</td>
      <td><span class="badge ${s.gender==='Nữ'?'badge-nu':'badge-nam'}">${s.gender}</span></td>
      <td class="hide-sm" style="font-size:13px;color:#6b7080">${s.email}</td>
      <td class="score ${rankClass(s.score)}">${sc}</td>
      <td class="score" style="font-weight:700">${(s.gpa || 0).toFixed(2)}</td>
      <td style="font-size:13px">${rk}</td>
      <td><span class="badge ${statusBadge(s.status)}">${s.status}</span></td>
      <td><div class="acts">
        <button class="act" onclick="openEdit(${s.id})" title="Sửa">✏️</button>
        <button class="act del" onclick="openDel(${s.id})" title="Xoá">🗑️</button>
      </div></td>
    </tr>`;
  }).join("");
}

// ─── Add / Edit ───────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById("form-title").textContent = "Thêm sinh viên";
  ["f-code","f-lname","f-fname","f-dob","f-email","f-score","f-gpa"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-gender").value = "Nam";
  document.getElementById("f-status").value = "Đang học";
  document.getElementById("modal-form").classList.add("open");
  setTimeout(() => document.getElementById("f-lname").focus(), 80);
}
function openEdit(id) {
  const s = students.find(x => x.id === id); if (!s) return;
  editId = id;
  document.getElementById("form-title").textContent = "Sửa thông tin";
  document.getElementById("f-code").value   = s.code;
  document.getElementById("f-lname").value  = s.lname;
  document.getElementById("f-fname").value  = s.fname;
  document.getElementById("f-dob").value    = s.dob;
  document.getElementById("f-email").value  = s.email;
  document.getElementById("f-gender").value = s.gender;
  document.getElementById("f-score").value  = s.score;
  document.getElementById("f-gpa").value    = s.gpa || 0;
  document.getElementById("f-status").value = s.status;
  document.getElementById("modal-form").classList.add("open");
}
function save() {
  const lname = document.getElementById("f-lname").value.trim();
  const fname = document.getElementById("f-fname").value.trim();
  if (!lname || !fname) { toast("⚠️ Vui lòng nhập đầy đủ họ và tên"); return; }
  const code   = document.getElementById("f-code").value.trim() || autoCode();
  const dob    = document.getElementById("f-dob").value;
  const email  = document.getElementById("f-email").value.trim();
  const gender = document.getElementById("f-gender").value;
  const score  = Math.min(10, Math.max(0, parseFloat(document.getElementById("f-score").value) || 0));
  const gpa    = Math.min(4, Math.max(0, parseFloat(document.getElementById("f-gpa").value) || 0));
  const status = document.getElementById("f-status").value;

  if (editId) {
    const s = students.find(x => x.id === editId);
    if (s) Object.assign(s, {code, lname, fname, dob, email, gender, score, gpa, status});
    toast("✅ Đã cập nhật thông tin");
  } else {
    students.push({id: nextId++, code, lname, fname, dob, email, gender, score, gpa, status});
    toast("✅ Đã thêm sinh viên mới");
  }
  saveData();
  closeModal("modal-form");
  render();
}
function autoCode() { return "SV2024" + String(nextId).padStart(3,"0"); }

// ─── Delete ───────────────────────────────────────────────────────────────────
function openDel(id) {
  const s = students.find(x => x.id === id); if (!s) return;
  delId = id;
  document.getElementById("del-name").textContent = s.lname + " " + s.fname;
  document.getElementById("modal-del").classList.add("open");
}
function confirmDel() {
  students = students.filter(x => x.id !== delId);
  saveData();
  toast("🗑️ Đã xoá sinh viên");
  closeModal("modal-del");
  render();
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function clearFilters() {
  fGender = ""; fStatus = ""; fRank = "";
  document.querySelectorAll('.toolbar select').forEach(s => s.value = "");
  document.getElementById("q-search").value = "";
  render();
}
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

// Close modal when clicking backdrop
document.querySelectorAll(".overlay").forEach(el =>
  el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); })
);

loadData();
render();
</script>
</body>
</html>
